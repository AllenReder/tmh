name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Zsh on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Test
        run: go test -race -timeout 2m ./...
      - name: Vet
        run: go vet ./...
      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -type f -name '*.go'))"
      - name: Validate shell files
        run: |
          zsh -n shell/tmh.zsh
          zsh shell/tmh.zsh.test.zsh
          sh -n install.sh
          sh tests/install.test.sh
      - name: Scan Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Validate release configuration
        if: runner.os == 'Linux'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.15.2
          args: check
